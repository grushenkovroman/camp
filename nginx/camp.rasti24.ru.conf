# =============================================================================
# Nginx configuration for camp.rasti24.ru
# Flask app (gunicorn) on 127.0.0.1:8091
# =============================================================================

upstream camp_rasti_backend {
    server 127.0.0.1:8091;
}

# --- HTTP -> HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name camp.rasti24.ru;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name camp.rasti24.ru;

    ssl_certificate     /etc/letsencrypt/live/camp.rasti24.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/camp.rasti24.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # body size (защита от больших POST)
    client_max_body_size 1m;

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_min_length 512;

    location / {
        proxy_pass http://camp_rasti_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }
}
