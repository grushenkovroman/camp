{% extends "base.html" %}
{% block body_class %}admin{% endblock %}
{% block content %}
<header class="admin-bar">
  <div class="admin-bar__left">
    <a class="admin-logo" href="{{ url_for('admin.dashboard') }}">CAMP / ADMIN</a>
    <nav class="admin-nav">
      <a href="{{ url_for('admin.dashboard') }}">Дашборд</a>
      <a href="{{ url_for('admin.scores_list') }}">Начисления</a>
      <a href="{{ url_for('admin.daily_task') }}">Задание дня</a>
      <a href="{{ url_for('admin.rotation_grid') }}">Ротация</a>
      <a href="{{ url_for('admin.schedule_list') }}">Расписание</a>
      <a href="{{ url_for('admin.activities_list') }}">Активности</a>
      <a href="{{ url_for('admin.categories_list') }}">Категории</a>
      <a href="{{ url_for('admin.shift_settings') }}">Смена</a>
    </nav>
  </div>
  <div class="admin-bar__right">
    <span class="admin-user">{{ current_user.login }}</span>
    <form method="post" action="{{ url_for('admin.logout') }}">
      <button class="btn btn--ghost" type="submit">Выйти</button>
    </form>
  </div>
</header>
<main class="admin-main">
  {% block admin_content %}{% endblock %}
</main>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% endblock %}
