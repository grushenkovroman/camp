{# форма быстрого начисления; ожидает: teams, categories, selected #}
<form class="quick-score" method="post" action="{{ url_for('admin.score_create') }}">
  <select name="team_id" required>
    <option value="">— команда —</option>
    {% for t in teams %}
      <option value="{{ t.id }}">{{ t.name }}</option>
    {% endfor %}
  </select>
  <select name="category" class="quick-score__category" title="категория подставит баллы и причину — их можно править">
    <option value="">— своя причина —</option>
    {% for c in categories %}
      <option value="{{ c.id }}" data-points="{{ c.default_points }}" data-name="{{ c.name }}">
        {{ c.name }} ({{ c.points_label or '{0:+d}'.format(c.default_points) }})
      </option>
    {% endfor %}
  </select>
  <input name="points" type="number" placeholder="±баллы" required step="1">
  <input name="reason" type="text" placeholder="причина (свободный текст)">
  <input name="event_date" type="date" value="{{ selected.isoformat() }}">
  <button class="btn btn--primary" type="submit">Начислить</button>
</form>
